<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periyodik Tablo</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f172a; 
      color: #e2e8f0; 
      margin: 0; 
      padding: 15px; 
    }
    h1 { 
      text-align: center; 
      margin: 10px 0 15px; 
    }
    .search-container {
      text-align: center;
      margin-bottom: 20px;
    }
    #search {
      padding: 12px 20px;
      width: 80%;
      max-width: 500px;
      border: none;
      border-radius: 30px;
      background: #1e2937;
      color: white;
      font-size: 16px;
    }
    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, 48px);
      gap: 3px;
      max-width: 1100px;
      margin: 0 auto;
      justify-content: center;
    }
    .element {
      width: 48px; 
      height: 58px; 
      background: #1e2937; 
      border: 2px solid #475569;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      font-size: 11px; 
      cursor: pointer; 
      transition: all 0.2s; 
      border-radius: 6px; 
      position: relative;
    }
    .element:hover { 
      transform: scale(1.25); 
      z-index: 10; 
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.9); 
    }
    .atomic-number { 
      font-size: 9px; 
      opacity: 0.85; 
      position: absolute; 
      top: 3px; 
      left: 4px; 
    }
    .symbol { 
      font-size: 17px; 
      font-weight: bold; 
    }
    .name { 
      font-size: 8px; 
      margin-top: 2px; 
      text-align: center; 
      line-height: 1; 
    }

    /* Renk Grupları */
    .alkali { border-color: #f59e0b; background: #451a03; }
    .alkaline { border-color: #eab308; background: #422006; }
    .transition { border-color: #3b82f6; background: #172554; }
    .post-transition { border-color: #8b5cf6; background: #2e1065; }
    .metalloid { border-color: #10b981; background: #052e16; }
    .nonmetal { border-color: #ef4444; background: #431407; }
    .halogen { border-color: #ec4899; background: #4c1d95; }
    .noble { border-color: #06b67f; background: #164e63; }
    .lanthanide { border-color: #a78bfa; background: #312e81; }
    .actinide { border-color: #f472b6; background: #431c4d; }

    .modal {
      display: none; 
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.95); 
      align-items: center; 
      justify-content: center; 
      z-index: 1000;
    }
    .modal-content {
      background: #1e2937; 
      padding: 25px; 
      border-radius: 12px; 
      max-width: 420px; 
      width: 90%;
      text-align: center; 
      border: 2px solid #64748b;
    }
  </style>
</head>

    const table = document.getElementById('table');
    let currentElements = [...elements];

    function renderTable(filteredElements) {
      table.innerHTML = '';
      filteredElements.forEach(el => {
        const div = document.createElement('div');
        div.className = `element ${el.group}`;
        div.innerHTML = `
          <div class="atomic-number">${el.num}</div>
          <div class="symbol">${el.symbol}</div>
          <div class="name">${el.name}</div>
        `;
        div.onclick = () => showModal(el);
        table.appendChild(div);
      });
    }

    // Arama fonksiyonu
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      
      if (!term) {
        currentElements = [...elements];
      } else {
        currentElements = elements.filter(el => 
          el.name.toLowerCase().includes(term) ||
          el.symbol.toLowerCase().includes(term) ||
          el.num.toString().includes(term)
        );
      }
      renderTable(currentElements);
    });

    // İlk yükleme
    renderTable(elements);

    function showModal(el) {
      document.getElementById('modal-symbol').innerHTML = `${el.num} - ${el.symbol}`;
      document.getElementById('modal-name').textContent = el.name;
      document.getElementById('modal-info').textContent = el.info;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

</html>
